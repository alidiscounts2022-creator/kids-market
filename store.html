<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>صفحة المحل | طفلي ماركت</title>
  <meta name="description" content="صفحة محل في طفلي ماركت تعرض منتجات التاجر المنشورة وروابط التواصل عبر واتساب." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --purple: #A855F7;
      --teal: #14B8A6;
      --sky: #38BDF8;
      --bg: #F5F7FA;
      --white: #FFFFFF;
      --text: #1F2937;
      --muted: #667085;
      --line: #E5EAF1;
      --shadow: 0 22px 56px rgba(31, 41, 55, 0.12);
      --container: min(1140px, calc(100% - 28px));
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Cairo", system-ui, sans-serif;
      color: var(--text);
      background:
        linear-gradient(135deg, rgba(168, 85, 247, .09), rgba(20, 184, 166, .08)),
        var(--bg);
      line-height: 1.7;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    .container { width: var(--container); margin-inline: auto; }
    .header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255,255,255,.86);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }
    .nav, .brand, .btn, .stat, .meta-line {
      display: flex;
      align-items: center;
    }
    .nav {
      min-height: 72px;
      justify-content: space-between;
      gap: 14px;
    }
    .brand {
      gap: 10px;
      font-weight: 900;
      white-space: nowrap;
    }
    .brand-mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      color: white;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--purple), var(--teal));
      box-shadow: 0 16px 30px rgba(168, 85, 247, .24);
    }
    .btn {
      justify-content: center;
      gap: 8px;
      min-height: 46px;
      padding: 11px 18px;
      border-radius: 999px;
      font-weight: 900;
      background: white;
      border: 1px solid var(--line);
    }
    .btn-primary {
      color: white;
      background: linear-gradient(135deg, var(--purple), var(--teal));
      border-color: transparent;
      box-shadow: 0 16px 32px rgba(168, 85, 247, .22);
    }
    main { padding-block: 24px 58px; }
    .hero {
      display: grid;
      gap: 16px;
      padding: 24px;
      border-radius: 28px;
      color: white;
      background: linear-gradient(135deg, #1F2937, var(--purple) 54%, var(--teal));
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }
    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(112deg, rgba(255,255,255,.14) 0 12%, transparent 12% 28%, rgba(255,255,255,.10) 28% 42%, transparent 42%);
      pointer-events: none;
    }
    .hero > * { position: relative; z-index: 1; }
    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,.24);
      border-radius: 999px;
      background: rgba(255,255,255,.16);
      font-weight: 900;
    }
    h1 {
      margin: 0;
      font-size: clamp(2rem, 7vw, 4rem);
      line-height: 1.16;
    }
    .hero p { margin: 0; color: rgba(255,255,255,.86); font-weight: 800; }
    .stats {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }
    .stat {
      gap: 10px;
      padding: 12px;
      color: var(--text);
      border-radius: 18px;
      background: rgba(255,255,255,.94);
      font-weight: 900;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 22px 0 14px;
    }
    .toolbar h2 { margin: 0; font-size: clamp(1.3rem, 5vw, 2.2rem); }
    .grid {
      display: grid;
      gap: 16px;
    }
    .card, .empty {
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(255,255,255,.96);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .card img {
      width: 100%;
      aspect-ratio: 1 / .76;
      object-fit: cover;
      background: #EAF8FF;
    }
    .card-body {
      display: grid;
      gap: 10px;
      padding: 14px;
    }
    .badge {
      width: fit-content;
      padding: 6px 10px;
      color: var(--purple);
      background: #F3E8FF;
      border-radius: 999px;
      font-weight: 900;
      font-size: .84rem;
    }
    .badge.code {
      color: #5B21B6;
      background: #F3E8FF;
    }
    .card h3 {
      margin: 0;
      font-size: 1.08rem;
      line-height: 1.35;
    }
    .price {
      color: var(--teal);
      font-weight: 900;
      font-size: 1.2rem;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .meta-line {
      gap: 7px;
      color: #475467;
      font-weight: 850;
      font-size: .9rem;
    }
    .empty {
      padding: 28px;
      text-align: center;
    }
    .empty h2 { margin: 0 0 8px; }
    @media (min-width: 620px) {
      .stats { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (min-width: 980px) {
      .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container nav">
      <a class="brand" href="index.html">
        <span class="brand-mark"><i data-lucide="baby"></i></span>
        <span>طفلي ماركت</span>
      </a>
      <a class="btn" href="index.html#products"><i data-lucide="arrow-right"></i>كل المنتجات</a>
    </div>
  </header>

  <main>
    <div class="container" id="app">
      <section class="empty">
        <h2>جاري تحميل صفحة المحل...</h2>
        <p>نجهز المنتجات المنشورة لهذا التاجر.</p>
      </section>
    </div>
  </main>

  <script>
    const PRODUCTS_URL = "https://qtfqbtymouzcjgsbupcf.supabase.co/functions/v1/public-products";
    const app = document.getElementById("app");
    const params = new URLSearchParams(location.search);
    const storeName = params.get("store");
    const merchantId = params.get("merchant_id");

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function safeImage(value) {
      const fallback = "https://images.unsplash.com/photo-1555252333-9f8e92e65df9?auto=format&fit=crop&w=900&q=80";
      if (!value) return fallback;
      try {
        const url = new URL(value);
        return ["http:", "https:"].includes(url.protocol) ? url.href : fallback;
      } catch {
        return fallback;
      }
    }

    function formatPrice(value) {
      const number = Number(value);
      if (!Number.isFinite(number) || number <= 0) return "السعر عند التاجر";
      return `${number.toLocaleString("ar-LY")} د.ل`;
    }

    function productCode(product) {
      const clean = String(product?.id || product?.title || "product").replace(/[^a-z0-9]/gi, "").toUpperCase();
      return `TF-${(clean || "PRODUCT").slice(0, 6)}`;
    }

    function whatsappStoreUrl(phone, store) {
      const clean = String(phone || "218912345678").replace(/\D/g, "") || "218912345678";
      const text = `السلام عليكم، نبي نستفسر على منتجات ${store}`;
      return `https://wa.me/${clean}?text=${encodeURIComponent(text)}`;
    }

    function productCard(product) {
      return `
        <article class="card">
          <a href="product.html?id=${encodeURIComponent(product.id)}">
            <img src="${safeImage(product.image_url)}" alt="${escapeHtml(product.title || "منتج")}" loading="lazy" />
          </a>
          <div class="card-body">
            <span class="badge code">${escapeHtml(productCode(product))}</span>
            <span class="badge">${escapeHtml(product.badge || product.category || "جديد")}</span>
            <h3><a href="product.html?id=${encodeURIComponent(product.id)}">${escapeHtml(product.title || "منتج بدون اسم")}</a></h3>
            <span class="price">${escapeHtml(formatPrice(product.price_lyd))}</span>
            <div class="meta">
              <span class="meta-line"><i data-lucide="map-pin"></i>${escapeHtml(product.city || "غير محدد")}</span>
              <span class="meta-line"><i data-lucide="layers-3"></i>${escapeHtml(product.category || "غير مصنف")}</span>
            </div>
            <a class="btn btn-primary" href="product.html?id=${encodeURIComponent(product.id)}"><i data-lucide="list-checks"></i>تفاصيل المنتج</a>
          </div>
        </article>
      `;
    }

    function renderStore(products) {
      if (!products.length) {
        app.innerHTML = `
          <section class="empty">
            <h2>لا توجد منتجات منشورة لهذا المحل حالياً</h2>
            <p>ربما المنتجات مازالت قيد المراجعة أو تم إخفاؤها مؤقتاً.</p>
            <p><a class="btn btn-primary" href="index.html#products"><i data-lucide="shopping-bag"></i>تصفح المنتجات</a></p>
          </section>
        `;
        lucide.createIcons();
        return;
      }

      const first = products[0];
      const store = first.store_name || storeName || "محل محلي";
      const categories = [...new Set(products.map(item => item.category).filter(Boolean))];
      const cities = [...new Set(products.map(item => item.city).filter(Boolean))];
      document.title = `${store} | طفلي ماركت`;

      app.innerHTML = `
        <section class="hero">
          <span class="kicker"><i data-lucide="store"></i>صفحة محل</span>
          <h1>${escapeHtml(store)}</h1>
          <p>كل المنتجات المنشورة لهذا المحل في طفلي ماركت. الاستفسارات تذهب مباشرة لواتساب التاجر.</p>
          <div class="stats">
            <div class="stat"><i data-lucide="package"></i>${products.length} منتج منشور</div>
            <div class="stat"><i data-lucide="map-pin"></i>${escapeHtml(cities.join("، ") || "ليبيا")}</div>
            <div class="stat"><i data-lucide="layers-3"></i>${escapeHtml(categories.slice(0, 3).join("، ") || "منتجات أطفال")}</div>
          </div>
          <p><a class="btn btn-primary" href="${whatsappStoreUrl(first.whatsapp_phone, store)}" target="_blank" rel="noopener"><i data-lucide="message-circle"></i>تواصل مع المحل</a></p>
        </section>
        <div class="toolbar">
          <h2>منتجات المحل</h2>
          <a class="btn" href="merchant.html"><i data-lucide="badge-plus"></i>أضف منتجاتك</a>
        </div>
        <section class="grid">
          ${products.map(productCard).join("")}
        </section>
      `;
      lucide.createIcons();
    }

    async function loadStore() {
      if (!storeName && !merchantId) {
        app.innerHTML = `
          <section class="empty">
            <h2>رابط المحل غير مكتمل</h2>
            <p>افتح صفحة المحل من بطاقة منتج منشور.</p>
          </section>
        `;
        lucide.createIcons();
        return;
      }

      const query = new URLSearchParams({ limit: "100" });
      if (storeName) query.set("store", storeName);
      if (merchantId) query.set("merchant_id", merchantId);

      try {
        const response = await fetch(`${PRODUCTS_URL}?${query.toString()}`);
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(payload.error || "تعذر تحميل منتجات المحل.");
        renderStore(Array.isArray(payload.products) ? payload.products : []);
      } catch (error) {
        app.innerHTML = `
          <section class="empty">
            <h2>تعذر تحميل صفحة المحل</h2>
            <p>${escapeHtml(error.message)}</p>
          </section>
        `;
        lucide.createIcons();
      }
    }

    loadStore();
    lucide.createIcons();
  </script>
</body>
</html>
