name: Deploy Supabase Functions

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"
      - ".github/workflows/deploy-supabase-functions.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: qtfqbtymouzcjgsbupcf
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check Supabase project ref
        run: |
          if ! [[ "$PROJECT_ID" =~ ^[a-z]{20}$ ]]; then
            echo "Invalid PROJECT_ID: it must be exactly the 20-letter Supabase project ref."
            exit 1
          fi

      - name: Deploy admin review function
        run: supabase functions deploy admin-review --project-ref "$PROJECT_ID" --no-verify-jwt

      - name: Deploy public products function
        run: supabase functions deploy public-products --project-ref "$PROJECT_ID" --no-verify-jwt

      - name: Deploy merchant auth function
        run: supabase functions deploy merchant-auth --project-ref "$PROJECT_ID" --no-verify-jwt

      - name: Deploy merchant dashboard function
        run: supabase functions deploy merchant-dashboard --project-ref "$PROJECT_ID" --no-verify-jwt

      - name: Deploy merchant submit function
        run: supabase functions deploy merchant-submit --project-ref "$PROJECT_ID" --no-verify-jwt

      - name: Deploy WhatsApp tracking function
        run: supabase functions deploy whatsapp-track --project-ref "$PROJECT_ID" --no-verify-jwt

      - name: Deploy Facebook import function
        continue-on-error: true
        run: supabase functions deploy facebook-import --project-ref "$PROJECT_ID" --no-verify-jwt

      - name: Deploy Facebook OAuth function
        continue-on-error: true
        run: supabase functions deploy facebook-oauth --project-ref "$PROJECT_ID" --no-verify-jwt
