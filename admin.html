<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة إدارة طفلي ماركت</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --purple: #A855F7;
      --teal: #14B8A6;
      --sky: #38BDF8;
      --bg: #F5F7FA;
      --white: #FFFFFF;
      --text: #1F2937;
      --muted: #667085;
      --line: #E5EAF1;
      --danger: #EF4444;
      --shadow: 0 18px 45px rgba(31, 41, 55, 0.1);
      --container: min(1180px, calc(100% - 28px));
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Cairo", system-ui, sans-serif;
      color: var(--text);
      background:
        linear-gradient(135deg, rgba(168, 85, 247, 0.08), rgba(20, 184, 166, 0.08)),
        var(--bg);
      line-height: 1.7;
    }
    button, input, select, textarea { font: inherit; }
    img { display: block; max-width: 100%; }
    .container { width: var(--container); margin-inline: auto; }

    .header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, 0.86);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(16px);
    }
    .header-inner {
      min-height: 74px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      white-space: nowrap;
    }
    .brand-mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      color: white;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--purple), var(--teal));
      box-shadow: 0 16px 30px rgba(168, 85, 247, 0.22);
    }
    .page {
      padding-block: 28px 54px;
    }
    .hero {
      display: grid;
      gap: 18px;
      padding: 24px;
      border-radius: 28px;
      color: white;
      background: linear-gradient(135deg, #1F2937, var(--purple) 55%, var(--teal));
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }
    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(112deg, rgba(255,255,255,.14) 0 12%, transparent 12% 28%, rgba(255,255,255,.1) 28% 42%, transparent 42%);
      pointer-events: none;
    }
    .hero > * { position: relative; z-index: 1; }
    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 5vw, 3rem);
      line-height: 1.2;
    }
    .hero p {
      margin: 0;
      max-width: 720px;
      color: rgba(255, 255, 255, 0.84);
      font-weight: 700;
    }
    .config-card, .draft-card, .empty-state {
      background: rgba(255,255,255,.96);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }
    .config-card {
      display: grid;
      gap: 12px;
      padding: 18px;
      margin-top: 18px;
    }
    .helper-note {
      margin: 0;
      color: var(--muted);
      font-size: .88rem;
      font-weight: 800;
    }
    .field label {
      display: block;
      margin-bottom: 7px;
      color: #596273;
      font-size: .82rem;
      font-weight: 900;
    }
    .field input, .field select, .field textarea {
      width: 100%;
      min-height: 48px;
      padding: 11px 13px;
      border: 1px solid var(--line);
      border-radius: 15px;
      outline: none;
      background: #FBFCFE;
      color: var(--text);
      font-weight: 700;
    }
    .field textarea {
      min-height: 96px;
      resize: vertical;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: rgba(168, 85, 247, .6);
      box-shadow: 0 0 0 4px rgba(168, 85, 247, .12);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
      padding: 10px 15px;
      border: 0;
      border-radius: 999px;
      font-weight: 900;
      cursor: pointer;
      transition: .2s ease;
      white-space: nowrap;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { color: white; background: linear-gradient(135deg, var(--purple), #7C3AED); }
    .btn-teal { color: white; background: linear-gradient(135deg, var(--teal), #0F9488); }
    .btn-danger { color: white; background: linear-gradient(135deg, var(--danger), #DC2626); }
    .btn-light { color: var(--text); background: #F2F6FB; border: 1px solid var(--line); }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-block: 24px 16px;
    }
    .toolbar h2 { margin: 0; font-size: 1.35rem; }
    .status {
      min-height: 26px;
      color: var(--muted);
      font-size: .9rem;
      font-weight: 800;
    }
    .status.error { color: var(--danger); }
    .status.ok { color: #0F766E; }
    .stats-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .stat-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--text);
      padding: 7px 10px;
      font-size: .82rem;
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(31, 41, 55, .06);
    }
    .stat-chip strong { color: var(--purple); }
    .drafts {
      display: grid;
      gap: 16px;
    }
    .draft-card {
      overflow: hidden;
      display: grid;
    }
    .draft-image {
      width: 100%;
      aspect-ratio: 1.4 / 1;
      background: #EAF0F6;
      object-fit: cover;
    }
    .draft-body {
      display: grid;
      gap: 14px;
      padding: 16px;
    }
    .draft-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .draft-head h3 { margin: 0; font-size: 1.08rem; line-height: 1.45; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      color: #7E22CE;
      background: #F3E8FF;
      font-size: .78rem;
      font-weight: 900;
      white-space: nowrap;
    }
    .draft-form {
      display: grid;
      gap: 10px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .config-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .empty-state {
      padding: 28px;
      text-align: center;
      color: var(--muted);
      font-weight: 800;
    }
    .source-link {
      color: #0369A1;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    @media (min-width: 760px) {
      .config-card { grid-template-columns: 1fr auto; align-items: end; }
      .config-card .wide { grid-column: 1 / -1; }
      .draft-card { grid-template-columns: 280px 1fr; }
      .draft-image { height: 100%; min-height: 310px; aspect-ratio: auto; }
      .draft-form { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .draft-form .wide { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <div class="brand">
        <span class="brand-mark"><i data-lucide="shield-check"></i></span>
        <span>لوحة إدارة طفلي ماركت</span>
      </div>
      <a class="btn btn-light" href="index.html"><i data-lucide="external-link"></i>عرض الموقع</a>
    </div>
  </header>

  <main class="page">
    <div class="container">
      <section class="hero">
        <h1>مراجعة مسودات المنتجات</h1>
        <p>هذه الصفحة مخصصة للإدارة. تعرض مسودات المنتجات المستوردة من فيسبوك وتسمح بتعديلها ثم نشرها في طفلي ماركت.</p>
      </section>

      <section class="config-card" aria-label="إعداد الاتصال">
        <p class="helper-note wide">أدخل مفتاح الإدارة فقط. لا تدخل مفاتيح Supabase مثل anon أو service role هنا.</p>
        <div class="field wide">
          <label for="adminKey">مفتاح الإدارة</label>
          <input id="adminKey" type="password" placeholder="ADMIN_API_KEY" />
        </div>
        <div class="config-actions">
          <button class="btn btn-primary" id="saveConfig" type="button"><i data-lucide="save"></i>حفظ وجلب المسودات</button>
          <button class="btn btn-teal" id="seedDraft" type="button"><i data-lucide="plus-circle"></i>إضافة مسودة تجريبية</button>
        </div>
      </section>

      <div class="toolbar">
        <div>
          <h2>المسودات بانتظار المراجعة</h2>
          <div class="status" id="status">أدخل مفتاح الإدارة للبدء.</div>
          <div class="stats-strip" id="statsStrip" aria-live="polite"></div>
        </div>
        <button class="btn btn-teal" id="refreshBtn" type="button"><i data-lucide="refresh-cw"></i>تحديث</button>
      </div>

      <section class="drafts" id="drafts"></section>
    </div>
  </main>

  <template id="draftTemplate">
    <article class="draft-card">
      <img class="draft-image" alt="" />
      <div class="draft-body">
        <div class="draft-head">
          <h3 data-field="titleText"></h3>
          <span class="pill" data-field="categoryPill"></span>
        </div>

        <form class="draft-form">
          <input type="hidden" name="id" />
          <div class="field wide">
            <label>اسم المنتج</label>
            <input name="title" required />
          </div>
          <div class="field">
            <label>السعر بالدينار الليبي</label>
            <input name="price_lyd" type="number" step="0.01" min="0" />
          </div>
          <div class="field">
            <label>التصنيف</label>
            <select name="category">
              <option>غير مصنف</option>
              <option>ملابس أطفال</option>
              <option>ألعاب</option>
              <option>مواليد</option>
              <option>أحذية</option>
              <option>عربات وكراسي</option>
            </select>
          </div>
          <div class="field">
            <label>المدينة</label>
            <input name="city" required />
          </div>
          <div class="field">
            <label>اسم المحل</label>
            <input name="store_name" required />
          </div>
          <div class="field">
            <label>واتساب</label>
            <input name="whatsapp_phone" required />
          </div>
          <div class="field">
            <label>رابط الصورة</label>
            <input name="image_url" type="url" />
          </div>
          <div class="field wide">
            <label>الوصف</label>
            <textarea name="description"></textarea>
          </div>
          <div class="wide">
            <a class="source-link" target="_blank" rel="noopener" data-field="sourceUrl"></a>
          </div>
          <div class="actions wide">
            <button class="btn btn-teal" type="submit"><i data-lucide="check"></i>اعتماد ونشر</button>
            <button class="btn btn-danger" type="button" data-action="reject"><i data-lucide="x"></i>رفض</button>
          </div>
        </form>
      </div>
    </article>
  </template>

  <script>
    const ADMIN_FUNCTION_URL = "https://qtfqbtymouzcjgsbupcf.supabase.co/functions/v1/admin-review";
    const adminKeyInput = document.getElementById("adminKey");
    const saveConfig = document.getElementById("saveConfig");
    const seedDraftBtn = document.getElementById("seedDraft");
    const refreshBtn = document.getElementById("refreshBtn");
    const statusEl = document.getElementById("status");
    const statsStrip = document.getElementById("statsStrip");
    const draftsEl = document.getElementById("drafts");
    const template = document.getElementById("draftTemplate");

    function getConfig() {
      return {
        adminKey: sessionStorage.getItem("tafli_admin_key") || "",
      };
    }

    function setStatus(message, type = "") {
      statusEl.textContent = message;
      statusEl.className = `status ${type}`.trim();
    }

    function setStats(stats) {
      if (!statsStrip) return;

      if (!stats) {
        statsStrip.innerHTML = "";
        return;
      }

      const latest = stats.latest_product?.title
        ? `<span class="stat-chip">آخر منتج: <strong>${escapeHtml(stats.latest_product.title)}</strong></span>`
        : "";

      statsStrip.innerHTML = `
        <span class="stat-chip">منشور: <strong>${Number(stats.published_products || 0)}</strong></span>
        <span class="stat-chip">بانتظار المراجعة: <strong>${Number(stats.pending_drafts || 0)}</strong></span>
        <span class="stat-chip">معتمد: <strong>${Number(stats.approved_drafts || 0)}</strong></span>
        ${latest}
      `;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;",
      }[char]));
    }

    function saveCurrentConfig() {
      sessionStorage.setItem("tafli_admin_key", adminKeyInput.value.trim());
    }

    async function api(path = "", options = {}) {
      const { adminKey } = getConfig();
      if (!adminKey) {
        throw new Error("أدخل مفتاح الإدارة ADMIN_API_KEY أولاً.");
      }
      const response = await fetch(`${ADMIN_FUNCTION_URL}${path}`, {
        ...options,
        headers: {
          "Content-Type": "application/json",
          "x-admin-key": adminKey,
          ...(options.headers || {}),
        },
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(payload.error || "تعذر تنفيذ الطلب.");
      }
      return payload;
    }

    async function loadDrafts() {
      try {
        setStatus("جاري جلب المسودات...");
        draftsEl.innerHTML = "";
        const [payload] = await Promise.all([
          api("?status=pending_review"),
          loadStats(),
        ]);
        renderDrafts(payload.drafts || []);
        setStatus(`تم جلب ${payload.drafts?.length || 0} مسودة.`, "ok");
      } catch (error) {
        setStatus(error.message, "error");
      }
    }

    async function loadStats() {
      const payload = await api("/stats");
      setStats(payload.stats);
      return payload.stats;
    }

    function renderDrafts(drafts) {
      draftsEl.innerHTML = "";
      if (!drafts.length) {
        draftsEl.innerHTML = `<div class="empty-state">لا توجد مسودات بانتظار المراجعة حالياً.</div>`;
        return;
      }

      drafts.forEach((draft) => {
        const node = template.content.cloneNode(true);
        const card = node.querySelector(".draft-card");
        const image = node.querySelector(".draft-image");
        const form = node.querySelector("form");
        const titleText = node.querySelector('[data-field="titleText"]');
        const categoryPill = node.querySelector('[data-field="categoryPill"]');
        const sourceUrl = node.querySelector('[data-field="sourceUrl"]');

        image.src = draft.image_url || "https://images.unsplash.com/photo-1555252333-9f8e92e65df9?auto=format&fit=crop&w=900&q=80";
        image.alt = draft.title || "مسودة منتج";
        titleText.textContent = draft.title || "مسودة منتج";
        categoryPill.textContent = draft.category || "غير مصنف";
        sourceUrl.textContent = draft.source_url ? "فتح منشور فيسبوك الأصلي" : "لا يوجد رابط مصدر";
        if (draft.source_url) sourceUrl.href = draft.source_url;

        fill(form, draft);
        form.addEventListener("submit", async (event) => {
          event.preventDefault();
          await approveDraft(form, card);
        });
        form.querySelector('[data-action="reject"]').addEventListener("click", async () => {
          await rejectDraft(draft.id, card);
        });

        draftsEl.appendChild(node);
      });
      lucide.createIcons();
    }

    function fill(form, draft) {
      for (const field of ["id", "title", "price_lyd", "category", "city", "store_name", "whatsapp_phone", "image_url", "description"]) {
        if (form.elements[field]) {
          form.elements[field].value = draft[field] ?? "";
        }
      }
    }

    function formData(form) {
      const data = Object.fromEntries(new FormData(form).entries());
      data.price_lyd = data.price_lyd ? Number(data.price_lyd) : null;
      return data;
    }

    async function approveDraft(form, card) {
      try {
        setStatus("جاري اعتماد المنتج...");
        await api("/approve", {
          method: "POST",
          body: JSON.stringify(formData(form)),
        });
        card.remove();
        const stats = await loadStats();
        const count = Number(stats?.published_products || 0);
        setStatus(`تم اعتماد المنتج ونشره. عدد المنتجات المنشورة الآن: ${count}.`, "ok");
      } catch (error) {
        setStatus(error.message, "error");
      }
    }

    async function rejectDraft(id, card) {
      try {
        setStatus("جاري رفض المسودة...");
        await api("/reject", {
          method: "POST",
          body: JSON.stringify({ id }),
        });
        card.remove();
        setStatus("تم رفض المسودة.", "ok");
      } catch (error) {
        setStatus(error.message, "error");
      }
    }

    async function seedDraft() {
      try {
        saveCurrentConfig();
        setStatus("جاري إنشاء مسودة تجريبية...");
        await api("/seed", {
          method: "POST",
          body: JSON.stringify({}),
        });
        setStatus("تم إنشاء مسودة تجريبية.", "ok");
        await loadDrafts();
      } catch (error) {
        setStatus(error.message, "error");
      }
    }

    saveConfig.addEventListener("click", () => {
      saveCurrentConfig();
      loadDrafts();
    });
    seedDraftBtn.addEventListener("click", seedDraft);
    refreshBtn.addEventListener("click", () => {
      saveCurrentConfig();
      loadDrafts();
    });

    const config = getConfig();
    adminKeyInput.value = config.adminKey;
    lucide.createIcons();
  </script>
</body>
</html>
