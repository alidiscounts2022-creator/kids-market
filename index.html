<!DOCTYPE html>

<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طفلي ماركت</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  direction: rtl;
  background: #FBFBF8;
}

/* Header */
.header {
  background: #ffffff;
  padding: 15px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #eee;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #010536;
}

.nav a {
  margin-left: 15px;
  text-decoration: none;
  color: #010536;
  font-weight: 500;
}

.cta {
  background: #F1F10D;
  padding: 8px 14px;
  border-radius: 6px;
}

/* Hero */
.hero {
  text-align: center;
  padding: 40px 20px;
  background: #ffffff;
}

.hero h1 {
  color: #010536;
  margin-bottom: 10px;
}

.hero p {
  color: #555;
}

.hero-btn {
  display: inline-block;
  margin-top: 15px;
  background: #010536;
  color: white;
  padding: 10px 20px;
  border-radius: 6px;
  text-decoration: none;
}

/* Products */
.products {
  padding: 30px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 20px;
}

.card {
  background: #ffffff;
  border-radius: 10px;
  padding: 15px;
}

.card img {
  width: 100%;
  border-radius: 8px;
}

.price {
  color: #010536;
  font-weight: bold;
}

.btn {
  display: block;
  margin-top: 10px;
  background: #25D366;
  color: white;
  text-align: center;
  padding: 8px;
  border-radius: 6px;
  text-decoration: none;
}
</style>

</head>

<body>

<!-- Header -->

<div class="header">
  <div class="logo">طفلي ماركت</div>
  <div class="nav">
    <a href="#">الرئيسية</a>
    <a href="#">المنتجات</a>
    <a href="#" class="cta">أضف منتجاتك</a>
  </div>
</div>

<!-- Hero -->

<div class="hero">
  <h1>كل مستلزمات الأطفال في مكان واحد 👶</h1>
  <p>تصفح منتجات من محلات ليبيا وتواصل مباشرة مع التاجر عبر واتساب</p>
  <a href="#" class="hero-btn">تصفح المنتجات</a>
</div>

<!-- Products -->

<div class="products">

  <div class="card">
    <img src="https://via.placeholder.com/300">
    <p>بدلة أطفال</p>
    <p class="price">65 د.ل</p>
    <a class="btn" href="https://wa.me/218XXXXXXXXX">تواصل واتساب</a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300">
    <p>حذاء أطفال</p>
    <p class="price">40 د.ل</p>
    <a class="btn" href="https://wa.me/218XXXXXXXXX">تواصل واتساب</a>
  </div>

</div>

</body>
</html>
